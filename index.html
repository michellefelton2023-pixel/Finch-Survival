<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finch Survival Simulator</title>
    <style>
        /* Designed for Chromebook Screens */
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; 
            background-color: #f0f4f8; 
            margin: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.5s;
            overflow: hidden; /* Prevents accidental scrolling */
        }

        #status-bar { 
            background: #2c3e50; 
            color: white; 
            padding: 15px 25px; 
            font-size: 2.2em; 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 6px solid #1a73e8;
            font-weight: bold;
            flex-shrink: 0;
        }

        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 20px 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            font-size: 2.5em; /* Very large text */
        }

        .msg { 
            padding: 25px; 
            border-radius: 25px; 
            max-width: 90%; 
            line-height: 1.2; 
            border: 4px solid #ddd; 
            box-shadow: 2px 5px 10px rgba(0,0,0,0.1);
        }

        .bot { background: #e8f0fe; align-self: flex-start; color: #000; border-color: #1a73e8; }
        .user { background: #34a853; color: white; align-self: flex-end; border-color: #267a3d; }
        
        #timer-display { 
            font-size: 10em; /* HUGE center timer */
            font-weight: bold; 
            text-align: center; 
            color: #d93025; 
            margin: 0;
            display: none; 
            text-shadow: 3px 3px 5px rgba(0,0,0,0.2);
        }
        
        #controls { 
            background: #e9ecef; 
            padding: 20px;
            border-top: 5px solid #ccc; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            justify-content: center;
            flex-shrink: 0;
        }

        button { 
            padding: 25px 40px; 
            font-size: 1.8em; 
            border: none; 
            border-radius: 50px; 
            background: #1a73e8; 
            color: white; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 6px 10px rgba(0,0,0,0.2);
        }

        button:active { transform: scale(0.9); }
        .feeding-active { background-color: #fff176 !important; } 
        .time-up { background-color: #ef9a9a !important; }
    </style>
</head>
<body>

<div id="status-bar">
    <span id="beak-display">Beak: ???</span>
    <span id="weather-display">Year: Intro</span>
</div>

<div id="chat-box">
    <div class="msg bot">👋 Hello! <br><b>Which beak tool do you have?</b></div>
</div>

<div id="timer-display">20</div>

<div id="controls">
    <button onclick="setBeak('Small Beak')">Small</button>
    <button onclick="setBeak('Medium Beak')">Medium</button>
    <button onclick="setBeak('Large Beak')">Large</button>
</div>

<script>
    let beak = "";
    let generation = 1;
    const chatBox = document.getElementById('chat-box');
    const controls = document.getElementById('controls');
    const timerDisplay = document.getElementById('timer-display');

    // Beeping Logic
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateStatus(weather) {
        document.getElementById('beak-display').innerText = `Beak: ${beak}`;
        document.getElementById('weather-display').innerText = `Year: ${weather}`;
    }

    function setBeak(type) {
        beak = type;
        addMsg("I have a " + type, 'user');
        updateStatus("1976 (Wet)");
        setTimeout(startGen1, 500);
    }

    function startGen1() {
        addMsg("<b>1976 - Wet Season:</b> Seeds are everywhere! <br>Press START to eat.", 'bot');
        controls.innerHTML = `<button style="background:#2ecc71; font-size: 2.2em; width: 80%;" onclick="startTimer()">START FEEDING</button>`;
    }

    function startTimer() {
        controls.innerHTML = ""; 
        chatBox.style.display = "none"; // Hide chat so timer is HUGE
        timerDisplay.style.display = "block";
        document.body.className = "feeding-active";
        let timeLeft = 20;
        timerDisplay.innerText = timeLeft;
        
        const countdown = setInterval(() => {
            timeLeft--;
            timerDisplay.innerText = timeLeft;
            if (timeLeft <= 3 && timeLeft > 0) playSound(440, 'sine', 0.2);
            if (timeLeft <= 0) {
                clearInterval(countdown);
                playSound(880, 'square', 0.6);
                document.body.className = "time-up";
                timerDisplay.innerText = "STOP!";
                setTimeout(finishRound, 1500);
            }
        }, 1000);
    }

    function finishRound() {
        timerDisplay.style.display = "none";
        chatBox.style.display = "flex";
        addMsg("<b>STOP!</b> Write your counts in your table.", 'bot');
        controls.innerHTML = `
            <button style="background:#2ecc71" onclick="handleResult('MOST')">MOST 🏆</button>
            <button style="background:#f1c40f; color:black;" onclick="handleResult('SOME')">SOME</button>
            <button style="background:#e74c3c" onclick="handleResult('LEAST')">LEAST ⚠️</button>
        `;
    }

    function handleResult(result) {
        document.body.className = "";
        addMsg(`I got ${result} seeds.`, 'user');
        if (generation === 1) {
            addMsg("Next year is coming...", 'bot');
            setTimeout(startGen2, 2000);
        } else if (generation === 2) {
            if (result === 'LEAST') {
                addMsg("<b>DROUGHT:</b> You died. <b>Take a LARGE CLIP now.</b>", 'bot');
                beak = "Large Beak";
                updateStatus("1977 (DROUGHT)");
            } else { addMsg("<b>SURVIVED!</b> You found enough food.", 'bot'); }
            setTimeout(startGen3, 3000);
        }
    }

    function startGen2() {
        generation = 2;
        updateStatus("1977 (DROUGHT)");
        addMsg("⚠️ <b>1977 - DROUGHT:</b> Small seeds are gone! Press START.", 'bot');
        controls.innerHTML = `<button style="background:#d93025; font-size: 2.2em; width: 80%;" onclick="startTimer()">START FEEDING</button>`;
    }

    function startGen3() {
        generation = 3;
        updateStatus("1978 (Recovery)");
        addMsg("✨ <b>1978:</b> Rain is back! Simulation complete.", 'bot');
        controls.innerHTML = "<b>Check your worksheet! 📢</b>";
    }
</script>
</body>
</html>
