<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finch Survival Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        #status-bar { background: #2c3e50; color: white; padding: 15px; border-radius: 15px 15px 0 0; font-weight: bold; font-size: 0.9em; display: flex; justify-content: space-between; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; }
        .bot { background: #e8f0fe; align-self: flex-start; color: #1a73e8; border-bottom-left-radius: 2px; }
        .user { background: #34a853; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #controls { padding: 20px; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 20px; background: #1a73e8; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #1557b0; transform: scale(1.05); }
        .highlight { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="status-bar">
        <span id="beak-display">Beak: None</span>
        <span id="weather-display">Year: ???</span>
    </div>
    
    <div id="chat-box">
        <div class="msg bot">Welcome, Scientist! Today we are studying the finches of Isla Daphne Mayor. <br><br>First, check your desk. <b>Which beak tool do you have?</b></div>
    </div>

    <div id="controls" id="btn-group">
        </div>
</div>

<script>
    let beak = "";
    let generation = 1;
    const chatBox = document.getElementById('chat-box');
    const controls = document.getElementById('controls');

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function updateStatus(weather) {
        document.getElementById('beak-display').innerText = `Beak: ${beak}`;
        document.getElementById('weather-display').innerText = `Year: ${weather}`;
    }

    function setBeak(type) {
        beak = type;
        addMsg(type, 'user');
        startGen1();
    }

    function startGen1() {
        updateStatus("1976 (Wet)");
        addMsg("<b>1976 - The Wet Season:</b> There is plenty of rain! Seeds of all sizes (small, medium, and large) are everywhere.<br><br><b>ACTION:</b> Use your tool to eat for 20 seconds. Count your seeds and write them in your worksheet!", 'bot');
        
        controls.innerHTML = `
            <button onclick="handleResult('MOST')">I got the MOST seeds!</button>
            <button onclick="handleResult('SOME')">I got SOME seeds.</button>
            <button onclick="handleResult('LEAST')">I got the LEAST seeds.</button>
        `;
    }

    function handleResult(result) {
        addMsg(`I got the ${result} seeds.`, 'user');
        
        if (generation === 1) {
            addMsg("Great job. Everyone survives the wet season! If you got the MOST, you had an offspring. Mark your worksheet.", 'bot');
            setTimeout(startGen2, 2000);
        } else if (generation === 2) {
            if (result === 'LEAST') {
                addMsg("<span class='highlight'>OH NO!</span> You did not get enough food to survive the drought. Your finch has died.", 'bot');
                addMsg("But wait! You are now the <b>offspring</b> of the winner. <br><br><b>ACTION: Put down your tool and pick up a LARGE BINDER CLIP.</b>", 'bot');
                beak = "Large Beak";
            } else {
                addMsg("Success! Your beak was strong enough to survive the drought!", 'bot');
            }
            setTimeout(startGen3, 3000);
        }
    }

    function startGen2() {
        generation = 2;
        updateStatus("1977 (DROUGHT)");
        addMsg("<b>1977 - THE DROUGHT:</b> The rain has stopped. The small plants are dying. <b>75% of small seeds are GONE.</b> Only the large, hard seeds are left on the ground.", 'bot');
        addMsg("<b>ACTION:</b> Try to feed for 20 seconds. Count your seeds for Generation 2!", 'bot');
    }

    function startGen3() {
        generation = 3;
        updateStatus("1978 (Recovering)");
        addMsg("<b>1978 - Recovery:</b> A little rain has returned. Some small seeds are growing back, but the population has already changed.", 'bot');
        addMsg("Look at your class. Are there more Large Beaks now than when we started? <b>That is Evolution by Natural Selection!</b>", 'bot');
        controls.innerHTML = "<b>Simulation Complete. Please finish your worksheet!</b>";
    }

    // Initial buttons
    controls.innerHTML = `
        <button onclick="setBeak('Small Beak')">Small Beak</button>
        <button onclick="setBeak('Medium Beak')">Medium Beak</button>
        <button onclick="setBeak('Large Beak')">Large Beak</button>
    `;
</script>

</body>
</html>
